# Workflow para publicar conteúdo estático no GitHub Pages
name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]   # dispara quando houver push na branch main
  workflow_dispatch:     # permite rodar manualmente pelo Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Se o index.html está na raiz do repositório, mantenha '.'
          # Se estiver em uma pasta (ex: public), troque para './public'
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
